         name: Build Neuromantico APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate project structure
        run: |
          echo "🔍 Validando estructura..."

          if [ ! -f "gradlew" ]; then
            echo "❌ ERROR: Falta gradlew en la raíz"
            exit 1
          fi

          if [ ! -d "app" ]; then
            echo "❌ ERROR: Falta carpeta app/"
            exit 1
          fi

          if [ ! -f "app/build.gradle" ] && [ ! -f "app/build.gradle.kts" ]; then
            echo "❌ ERROR: Falta build.gradle en app/"
            exit 1
          fi

          echo "✅ Estructura OK"

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Give execute permission
        run: chmod +x gradlew

      - name: Debug Gradle Version
        run: ./gradlew --version

      - name: Clean project
        run: ./gradlew clean

      - name: Build APK (VERBOSE)
        run: ./gradlew assembleDebug --stacktrace --info

      - name: Verify APK exists
        run: |
          if [ ! -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "❌ ERROR: APK no generada"
            exit 1
          fi
          echo "✅ APK generada correctamente"

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: neuromantico-apk
          path: app/build/outputs/apk/debug/app-debug.apk   - nombre: Cargar un artefacto de compilación
  Usos: actions/upload-artifact@v3.2.2
  con:
    # Nombre del artefacto
    nombre: # opcional, por defecto es artefacto
    # Un archivo, directorio o patrón comodín que describe qué subir
    camino:
    # El comportamiento deseado si no se encuentran archivos utilizando la ruta proporcionada.
Opciones disponibles:
  advertir: Mostrar una advertencia pero no hacer que falle la acción.
  error: La acción falla con un mensaje de error
  ignorar: No se mostrarán advertencias ni errores, la acción no falla.

    if-no-files-found: # opcional, el valor predeterminado es advertir
    # Duración tras la cual el artefacto caducará en días. 0 significa usar la retención predeterminada.
Mínimo 1 día. Máximo 90 días, a menos que se modifique en la página de configuración del repositorio.

    días de retención: # opcional
    # Si es verdadero, los archivos ocultos se incluirán en el artefacto cargado. Si es falso, los archivos ocultos se excluirán del artefacto cargado.

    include-hidden-files: # opcional, el valor predeterminado es falso
          
